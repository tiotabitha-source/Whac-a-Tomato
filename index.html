<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">

  <title>Whac-a-Tomato</title>

<body>
  <h1>Whac-a-Tomato</h1>
  <h2>How to Play:</h2>
  <p>(Scroll down to see the full screen)</p>
  <p>Collect as much <span class="tomatoes">Tomatoes</span> as you can that grow out of the ground. However, beware of <span class="stinkbugs">Stink Bugs</span>; the game is over if you grab one! Good luck and Happy Father's Day!</p>

  <button id="startButton">Start</button>
  
  <h2 id="score">0</h2>
  <h2 id="tryagain">Father's Day, June 21, 2026</h2>

  <div id ="board"></div>

  <p>Made by Mei Mei</p>
  
  <script src="script.js"></script>
</body>
